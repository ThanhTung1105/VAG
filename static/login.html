<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VietAnh PMO — Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --brand:#0066B3; --brand-light:#e8f2fa; --t1:#111827; --t2:#4b5563; --t3:#9ca3af; --bg:#f8f9fb; --bdr:#e5e7eb; --red:#dc2626; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--t1); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-card { background:#fff; border:1px solid var(--bdr); border-radius:12px; padding:40px; width:380px; box-shadow:0 4px 24px rgba(0,0,0,.06); }
.login-card h1 { font-size:20px; font-weight:800; text-align:center; margin-bottom:4px; color:var(--t1); }
.login-card .brand { color:var(--brand); }
.login-card p { text-align:center; color:var(--t3); font-size:12.5px; margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:11.5px; font-weight:700; color:var(--t2); margin-bottom:6px; }
.form-group input { width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--bdr); border-radius:6px; color:var(--t1); font-size:13px; font-family:inherit; }
.form-group input:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(0,102,179,.1); }
.btn-login { width:100%; padding:11px; background:var(--brand); color:#fff; border:none; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; transition:background .15s; }
.btn-login:hover { background:#004a82; }
.btn-login:disabled { opacity:.5; cursor:not-allowed; }
.error { background:#fef2f2; border:1px solid #fecaca; color:var(--red); padding:8px 12px; border-radius:6px; font-size:12px; margin-bottom:16px; display:none; }
</style>
</head>
<body>
<div class="login-card">
  <h1><span class="brand">⬡</span> VietAnh PMO</h1>
  <p>Đăng nhập để tiếp tục</p>
  <div class="error" id="error"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="email@vietanh-group.com" autofocus>
  </div>
  <div class="form-group">
    <label>Mật khẩu</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="btn-login" id="btnLogin">Đăng nhập</button>
</div>
<script>
(function() {
  var btn = document.getElementById('btnLogin');
  var err = document.getElementById('error');
  function doLogin() {
    var emailVal = document.getElementById('email').value.trim();
    var passVal = document.getElementById('password').value;
    err.style.display = 'none'; btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
    fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:emailVal, password:passVal}) })
    .then(function(r) { return r.json().then(function(d) { return {ok:r.ok,data:d}; }); })
    .then(function(res) {
      if (!res.ok) { err.textContent = res.data.error||'Đăng nhập thất bại'; err.style.display='block'; btn.disabled=false; btn.textContent='Đăng nhập'; return; }
      window.location.href = '/';
    })
    .catch(function() { err.textContent='Không thể kết nối server'; err.style.display='block'; btn.disabled=false; btn.textContent='Đăng nhập'; });
  }
  btn.addEventListener('click', doLogin);
  document.getElementById('password').addEventListener('keydown', function(e) { if (e.key==='Enter') doLogin(); });
  document.getElementById('email').addEventListener('keydown', function(e) { if (e.key==='Enter') document.getElementById('password').focus(); });
})();
</script>
</body>
</html>
