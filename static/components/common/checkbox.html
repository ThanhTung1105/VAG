<div class="sec" id="checkbox">

  <div class="sec-line"></div>

  <div class="card">
    <div class="row">
      <span class="pmo-check" onclick="this.classList.toggle('checked')"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.5 6L5 8.5L9.5 3.5"/></svg></span> Unchecked

    </div>
  </div>
</div>
