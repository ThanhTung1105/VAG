<div class="sec" id="popover_shell">
  <div class="sec-head"><span class="sec-title">Popover Shell</span><span class="sec-id">popover_detail/popover_shell</span></div>
  <div class="sec-line"></div>
  <p class="sec-desc">Test toàn bộ components trong popover thật: sửa assignees, đổi milestone, thêm đầu việc, gửi ghi chú, duyệt/từ chối, sửa tên/mô tả,...</p>
  <div class="card">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="pmo-chip-add" onclick="openTaskDemo()">Task (6 tabs)</button>
      <button class="pmo-chip-add" onclick="openWpDemo()">Work Package (5 tabs)</button>
      <button class="pmo-chip-add" onclick="openPhaseDemo()">Phase (5 tabs)</button>
      <button class="pmo-chip-add" onclick="openProjectDemo()">Project (4 tabs)</button>
      <button class="pmo-chip-add" onclick="openProgramDemo()">Program (3 tabs)</button>
    </div>
  </div>
  <div id="popContainer"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   TASK POPOVER — full interactive demo
   ═══════════════════════════════════════════════════════ */
function openTaskDemo() {
  // Tab: Tổng quan
  var ov = '<div class="panel-full">';
  ov += PMO.Field.rowCol('Hình thức', PMO.ExecMode.render('offline', 'Họp trực tiếp tại văn phòng Việt Anh, tầng 3', {editable:true}));
  ov += PMO.Field.row('Kết quả', PMO.DeliverableLink.render('https://drive.google.com/file/abc', {editable:true}));
  ov += PMO.Field.row('Trạng thái', PMO.StatusChip.render('in_progress', 'on_track', {editable:true}) + ' ' + PMO.HealthChip.render('on_track', {editable:true}));
  ov += PMO.Field.row('Tiến độ', PMO.ProgressInline.render(80, 60, 'on_track', 'in_progress'));
  ov += PMO.Field.rowCol('KQ chính', PMO.Summary.render('Kế hoạch dự án đã xong, team đã thành lập.', {editable:true}));
  ov += PMO.Field.row('Kế hoạch', PMO.Date.renderRange('13/04/2026', '18/04/2026', {showTime:false, editable:true}));
  ov += PMO.Field.row('Thực hiện', PMO.Date.renderRange('13/04/2026', '17/04/2026', {showTime:false, editable:true}));
  ov += PMO.Field.row('PIC', PMO.MemberField.renderSingle('Long NNL','BI Analyst',{editable:true}));
  ov += PMO.Field.row('Approver', PMO.MemberField.renderSingle('Anh LTD','GĐ Điều hành',{editable:true}));
  ov += PMO.Field.row('Assignees', PMO.MemberField.renderList([{name:'Long NNL',role:'BI Analyst'},{name:'Hà NTT',role:'Admin'},{name:'Minh PT',role:'IT'}], {maxLines:2, editable:true}));
  ov += '</div>';

  // Tab: Đầu việc
  var st = '<div class="panel-scroll" id="popSubtaskScroll"><div id="popSubtasks">' + PMO.Subtask.renderList([
    {id:'st1', content:'Lập danh sách đầu mối liên hệ', finishStatus:'approved', assignee:'Long NNL', notes:[{id:'sn1',author:'Long NNL',time:'13/04 09:30',content:'Đã liên hệ 5/7 đầu mối',isOwner:true}]},
    {id:'st2', content:'Chuẩn bị phòng họp kick-off', finishStatus:'finished', assignee:'Hà NTT', notes:[]},
    {id:'st3', content:'Soạn agenda buổi kick-off', finishStatus:'unfinished', assignee:'Long NNL', notes:[{id:'sn2',author:'Minh PT',time:'14/04 08:00',content:'Nên thêm phần Q&A',isOwner:false}]},
    {id:'st4', content:'Kiểm tra âm thanh', finishStatus:'unfinished', assignee:'', notes:[]},
    {id:'st5', content:'Kiểm tra đường truyền mạng', finishStatus:'unfinished', assignee:'', notes:[]},
    {id:'st6', content:'Căn góc máy quay', finishStatus:'unfinished', assignee:'Hà NTT', notes:[]},
    {id:'st7', content:'Kiểm tra kết nối máy chiếu', finishStatus:'unfinished', assignee:'', notes:[]},
  ], {showAdd:false}) + '</div></div>';
  st += '<div class="panel-footer"><div class="pmo-subtask-add" data-action="add-subtask" style="margin:0;padding:4px 0"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><circle cx="7" cy="7" r="5.5"/><path d="M7 4.5v5M4.5 7h5"/></svg> Thêm đầu việc</div></div>';

  // Tab: Phê duyệt
  var ap = '<div class="panel-full"><div id="popApprove">' + PMO.Approve.renderList([
    {id:'st2', content:'Chuẩn bị phòng họp', assignee:'Hà NTT', finishedAt:'15/04 14:00', status:'pending'},
    {id:'st3', content:'Soạn agenda kick-off', assignee:'Long NNL', finishedAt:'16/04 10:00', status:'pending'},
    {id:'st1', content:'Lập danh sách đầu mối', assignee:'Long NNL', finishedAt:'13/04 17:00', status:'approved', approvedAt:'14/04 09:00'},
  ]) + '</div></div>';

  // Tab: Ghi chú
  var notes = [
    {id:'n1',author:'Anh LTD',time:'13/04 09:15',content:'Kiểm tra mic trước 30 phút.',source:'Task',isOwner:false},
    {id:'n2',author:'Long NNL',time:'13/04 10:30',content:'OK anh, đã book phòng rồi.',source:'Task',isOwner:true},
    {id:'n3',author:'Hà NTT',time:'13/04 11:00',content:'Slide kick-off em đã gửi qua email.',source:'Task',isOwner:false},
    {id:'n4',author:'Long NNL',time:'13/04 14:20',content:'Đã review xong, có vài chỗ cần sửa.',source:'Task',isOwner:true},
    {id:'n5',author:'Minh PT',time:'14/04 08:00',content:'Citek confirm 3 người tham dự.',source:'WP',isOwner:false},
  ];
  var nt = '<div class="panel-scroll"><div class="pmo-note-list" id="popNoteList">';
  for (var i=0;i<notes.length;i++) nt += PMO.Note.renderItem(notes[i]);
  nt += '</div></div><div class="panel-footer"><div class="pmo-note-input" style="border-top:none;margin:0;padding:0"><textarea class="ni-textarea" placeholder="Nhập ghi chú..." rows="1"></textarea><button class="ni-send" title="Gửi">'+PMO.Note.SEND_SVG+'</button></div></div>';

  // Tab: Lịch sử
  var tr = '<div class="panel-full"><div id="popTrail">' + PMO.Trail.renderList([
    {source:'user',user:'Long NNL',time:'13/04 09:00',action:'add',level:'task',target:'Xây dựng kế hoạch dự án'},
    {source:'user',user:'Long NNL',time:'13/04 09:05',action:'add',level:'subtask',target:'Lập danh sách đầu mối'},
    {source:'user',user:'Long NNL',time:'13/04 09:06',action:'add',level:'subtask',target:'Chuẩn bị phòng họp kick-off'},
    {source:'user',user:'Hà NTT',time:'14/04 10:00',action:'edit',level:'task',target:'Xây dựng kế hoạch dự án',attr:'planned_finish',oldVal:'15/04',newVal:'18/04'},
    {source:'system',time:'16/04 00:00',action:'edit',level:'task',target:'Xây dựng kế hoạch dự án',attr:'status',oldVal:'Chưa bắt đầu',newVal:'Đang thực hiện'},
    {source:'user',user:'Long NNL',time:'16/04 16:30',action:'edit',level:'subtask',target:'Lập danh sách đầu mối',attr:'finish_status',oldVal:'unfinished',newVal:'finished'},
    {source:'user',user:'Anh LTD',time:'17/04 09:00',action:'edit',level:'subtask',target:'Lập danh sách đầu mối',attr:'finish_status',oldVal:'finished',newVal:'approved'},
  ]) + '</div></div>';

  PMO.PopoverShell.mount(document.getElementById('popContainer'), {
    breadcrumb: [{label:'Chuyển đổi số',level:'program',id:'prg1'},{label:'SAP S/4HANA',level:'project',id:'prj1'},{label:'Prepare',level:'phase',id:'ph1'},{label:'Khởi động dự án',level:'wp',id:'wp1'}],
    level:'task', title:'Xây dựng kế hoạch dự án, chuẩn bị CSVC',
    description:'Lên kế hoạch chi tiết cho giai đoạn Prepare.', editable:true,
    tabs:[{key:'overview',label:'Tổng quan'},{key:'subtasks',label:'Đầu việc',count:'7'},{key:'approve',label:'Phê duyệt',count:'2'},{key:'notes',label:'Ghi chú',count:'5'},{key:'deps',label:'Phụ thuộc'},{key:'history',label:'Lịch sử'}],
    panels:{overview:ov, subtasks:st, approve:ap, notes:nt, deps:'<div class="panel-full"><div style="color:var(--t3);text-align:center;padding:40px;font-size:12px">Chưa có phụ thuộc nào</div></div>', history:tr},
    onMount: function(el) {
      // Subtask
      var stP = el.querySelector('[data-panel="subtasks"]'); if (stP) PMO.Subtask.bind(stP, {currentUser:'Long NNL'});
      // Approve
      var apEl = el.querySelector('#popApprove'); if (apEl) PMO.Approve.bind(apEl);
      // Notes
      var notePanel = el.querySelector('[data-panel="notes"]');
      if (notePanel) {
        var noteList = notePanel.querySelector('.pmo-note-list');
        var textarea = notePanel.querySelector('.ni-textarea');
        var sendBtn = notePanel.querySelector('.ni-send');
        var scrollArea = notePanel.querySelector('.panel-scroll');
        if (scrollArea) scrollArea.scrollTop = scrollArea.scrollHeight;
        if (textarea) textarea.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,80)+'px'; });
        if (sendBtn && textarea) {
          function doSend() {
            var text = textarea.value.trim(); if (!text) return;
            var tmp = document.createElement('div');
            tmp.innerHTML = PMO.Note.renderItem({id:'n_'+Date.now(),author:'Long NNL',time:PMO.Note._now(),content:text,source:'Task',isOwner:true});
            noteList.appendChild(tmp.firstElementChild);
            if (scrollArea) scrollArea.scrollTop = scrollArea.scrollHeight;
            textarea.value=''; textarea.style.height='auto';
          }
          sendBtn.addEventListener('click', doSend);
          textarea.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();} });
        }
        // Bind edit/delete on notes
        if (noteList) {
          noteList.addEventListener('click', function(e) {
            var btn = e.target.closest('.ni-act-btn');
            if (!btn) return;
            var noteEl = btn.closest('.pmo-note-item');
            if (!noteEl) return;
            if (btn.dataset.act === 'delete') { noteEl.remove(); }
            else if (btn.dataset.act === 'edit') {
              var c = noteEl.querySelector('.ni-content');
              c.setAttribute('contenteditable','true'); c.focus();
              c.style.background='#FFFBEB'; c.style.padding='4px'; c.style.borderRadius='4px'; c.style.outline='1.5px solid var(--c-ar)';
              c.addEventListener('blur', function(){ c.removeAttribute('contenteditable'); c.style.background=''; c.style.padding=''; c.style.borderRadius=''; c.style.outline=''; }, {once:true});
            }
          });
        }
      }
      // Trail
      var trEl = el.querySelector('#popTrail'); if (trEl) PMO.Trail.bind(trEl);
    }
  });
}

/* ═══════════════════════════════════════════════════════

    level:'wp', title:'Khởi động dự án',
    description:'Work package cho việc khởi động dự án SAP.',
    editable:true,
    tabs:[{key:'overview',label:'Tổng quan'},{key:'tasks',label:'Công việc',count:'5'},{key:'notes',label:'Ghi chú',count:'1'},{key:'deps',label:'Phụ thuộc'},{key:'history',label:'Lịch sử'}],
